<!DOCTYPE html>
<html lang="en">

<head>
    <title>Post - Randhawa Inc.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.svg">
    <!-- CRITICAL_CSS_PLACEHOLDER -->
    <style>
        .form-group {
            margin-bottom: 1.5em
        }

        label {
            display: block;
            margin-bottom: 0.4em;
            color: #666;
            font-size: 0.8em;
            letter-spacing: 0.08em;
            text-transform: uppercase
        }

        input[type="text"] {
            width: 100%;
            padding: 0.4em 0;
            border: none;
            border-bottom: 1px solid #eee;
            font-family: inherit;
            font-size: 1.2em;
            box-sizing: border-box;
            background: transparent;
            color: #1a1a1a;
            transition: border-color 0.3s
        }

        input[type="text"]:focus {
            outline: none;
            border-bottom-color: #1a1a1a
        }

        textarea {
            width: 100%;
            min-height: 280px;
            padding: 1em;
            border: 1px solid #eee;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1em;
            line-height: 1.6;
            box-sizing: border-box;
            background: transparent;
            color: #1a1a1a;
            resize: vertical;
            transition: border-color 0.3s
        }

        textarea:focus {
            outline: none;
            border-color: #1a1a1a
        }

        input::placeholder,
        textarea::placeholder {
            color: #ccc;
            font-style: italic
        }

        button {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #1a1a1a;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            width: 100%;
            padding: 0.8em;
            margin-top: 0.5em
        }

        button:hover {
            background: transparent;
            color: #1a1a1a
        }

        button:disabled {
            background: #f5f5f5;
            color: #bbb;
            border-color: #eee;
            cursor: not-allowed
        }

        #status {
            margin-top: 1.5em;
            padding: 1em;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s
        }

        #status.show {
            opacity: 1
        }

        .success {
            background: #f0f7f0;
            color: #2b703e;
            border: 1px solid #d4e8d4
        }

        .error {
            background: #fef0ef;
            color: #a33b32;
            border: 1px solid #f5d5d3
        }
    </style>
</head>

<body>
    <div class="profile-pic">
        <img src="profile.png" alt="Profile" width="80" height="80">
    </div>

    <h1>Draft</h1>

    <form id="postForm">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="A brief thought..." autocomplete="off">
        </div>
        <div class="form-group">
            <label for="customSlug">Custom Slug (Optional)</label>
            <input type="text" id="customSlug" placeholder="e.g. my-custom-url" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="content">Body</label>
            <textarea id="content" required placeholder="Just write..."></textarea>
        </div>
        <div class="form-group">
            <label for="password">Authentication</label>
            <input type="text" id="password" required placeholder="Personal Access Token" autocomplete="off"
                autocorrect="off" autocapitalize="none">
        </div>
        <button type="submit" id="submitBtn">Publish</button>
    </form>

    <div id="status"></div>

    <script>
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const titleInput = document.getElementById('title').value.trim();
            const slugInput = document.getElementById('customSlug').value.trim();
            const contentInput = document.getElementById('content').value.trim();
            const token = document.getElementById('password').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Publishing...';
            statusDiv.className = '';

            const REPO_OWNER = 'prabhchintan';
            const REPO_NAME = 'prabhchintan.com';

            try {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');

                let slug = slugInput || titleInput;
                slug = slug.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                if (!slug) slug = 'post-' + year + month + day;
                if (!slugInput) {
                    slug = slug + '-' + String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0');
                }

                const filename = year + '_' + month + '_' + day + '_' + slug + '.md';

                function processText(text) {
                    var ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
                    var result = text.replace(ytRegex, function (match, videoId) {
                        return '\n\n<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;border-radius:8px;margin:1.5em 0"><iframe src="https://www.youtube.com/embed/' + videoId + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>\n\n';
                    });
                    var urlRegex = /(?<!src="|href="|\]\()(https?:\/\/[^\s]+)/ig;
                    result = result.replace(urlRegex, '[$1]($1)');
                    return result;
                }

                var processed = processText(contentInput);
                var markdownContent = '# ' + titleInput + '\n\n' + processed;
                var encodedContent = btoa(unescape(encodeURIComponent(markdownContent)));

                var apiUrl = 'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/posts/' + filename;

                var response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'token ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Mobile publish: ' + titleInput,
                        content: encodedContent,
                        branch: 'main'
                    })
                });

                if (!response.ok) {
                    var errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to publish');
                }

                statusDiv.innerHTML = 'Published. Site updates in ~60 seconds.';
                statusDiv.className = 'success show';
                document.getElementById('title').value = '';
                document.getElementById('customSlug').value = '';
                document.getElementById('content').value = '';

            } catch (error) {
                statusDiv.innerHTML = 'Error: ' + error.message;
                statusDiv.className = 'error show';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publish';
            }
        });
    </script>
</body>

</html>
