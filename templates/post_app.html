<!DOCTYPE html>
<html lang="en">

<head>
    <title>Draft - Randhawa Inc.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <!-- CRITICAL_CSS_PLACEHOLDER -->
    <style>
        .form-group {
            margin-bottom: 1.5em
        }

        label {
            display: block;
            margin-bottom: 0.4em;
            color: var(--meta-color);
            font-size: 0.8em;
            letter-spacing: 0.08em;
            text-transform: uppercase
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.4em 0;
            border: none;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-body);
            font-size: 1.2em;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            transition: border-color 0.3s
        }

        input:focus {
            outline: none;
            border-bottom-color: var(--text-color)
        }

        textarea {
            width: 100%;
            min-height: 280px;
            padding: 1em;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1em;
            line-height: 1.6;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            resize: vertical;
            transition: border-color 0.3s
        }

        textarea:focus {
            outline: none;
            border-color: var(--text-color)
        }

        button {
            background: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
            width: 100%;
            padding: 0.8em;
            margin-top: 0.5em
        }

        button:hover {
            background: transparent;
            color: var(--text-color)
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .media-upload {
            margin: 1em 0;
            padding: 1em;
            border: 2px dashed var(--border-color);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s
        }

        .media-upload:hover {
            border-color: var(--text-color)
        }

        #status {
            margin-top: 1em;
            padding: 1em;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: center;
            display: none
        }

        #status.show {
            display: block
        }

        .success {
            background: #f0f7f0;
            color: #2b703e;
            border: 1px solid #d4e8d4
        }

        .error {
            background: #fef0ef;
            color: #a33b32;
            border: 1px solid #f5d5d3
        }

        .warning {
            background: #fff9e6;
            color: #8b6914;
            border: 1px solid #f5e5b3
        }

        .slug-preview {
            margin-top: 0.5em;
            padding: 0.5em;
            font-size: 0.85em;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.02);
            color: var(--meta-color);
            font-family: monospace;
        }

        .slug-collision {
            background: #fef0ef;
            color: #a33b32;
            border: 1px solid #f5d5d3;
        }

        .slug-available {
            background: #f0f7f0;
            color: #2b703e;
            border: 1px solid #d4e8d4;
        }
    </style>
</head>

<body>
    <div class="profile-pic">
        <img src="/profile.png" alt="Profile" width="80" height="80">
    </div>

    <h1>Draft</h1>

    <form id="postForm">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="A brief thought..." autocomplete="off">
        </div>

        <div class="form-group">
            <label for="slug">Custom Slug (Optional)</label>
            <input type="text" id="slug" placeholder="custom-url" autocomplete="off">
            <div id="slugPreview" class="slug-preview" style="display:none"></div>
        </div>

        <div class="form-group">
            <label for="content">Body</label>
            <textarea id="content" required placeholder="Just write..."></textarea>
        </div>

        <div class="media-upload" onclick="document.getElementById('mediaFile').click()">
            <input type="file" id="mediaFile" style="display:none" accept="image/*,video/*,audio/*">
            <p>📎 Attach Media</p>
            <small id="uploadStatus"></small>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Admin password" autocomplete="off">
        </div>

        <button type="submit" id="submitBtn">Publish</button>
    </form>

    <div id="status"></div>

    <script>
        const API = '/api';
        let existingSlugs = new Set();

        // Load existing posts on page load
        async function loadExistingSlugs() {
            try {
                const response = await fetch(`${API}/posts`);
                const result = await response.json();
                if (response.ok && result.posts) {
                    existingSlugs = new Set(result.posts.map(p => p.slug));
                }
            } catch (error) {
                console.log('Could not load existing posts for collision detection');
            }
        }

        // Generate slug from text
        function generateSlug(text) {
            return text.toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)/g, '');
        }

        // Check slug and show preview
        function checkSlugCollision() {
            const title = document.getElementById('title').value.trim();
            const customSlug = document.getElementById('slug').value.trim();
            const preview = document.getElementById('slugPreview');

            if (!title && !customSlug) {
                preview.style.display = 'none';
                return;
            }

            // Generate what the slug would be
            let computedSlug = customSlug || generateSlug(title);

            // Add timestamp if no custom slug (matching server logic)
            if (!customSlug && title) {
                const now = new Date();
                const time = String(now.getHours()).padStart(2, '0') +
                           String(now.getMinutes()).padStart(2, '0');
                computedSlug = `${computedSlug}-${time}`;
            }

            preview.style.display = 'block';

            // Check for collision
            if (existingSlugs.has(computedSlug)) {
                preview.className = 'slug-preview slug-collision';
                preview.innerHTML = `⚠️ Slug collision: <code>${computedSlug}</code> already exists<br>` +
                                  `<small>Choose a different title or add a custom slug</small>`;
                document.getElementById('submitBtn').disabled = true;
            } else {
                preview.className = 'slug-preview slug-available';
                preview.innerHTML = `✓ Will be published as: <code>/${computedSlug}</code>`;
                document.getElementById('submitBtn').disabled = false;
            }
        }

        // Initialize
        loadExistingSlugs();

        // Real-time slug checking
        document.getElementById('title').addEventListener('input', checkSlugCollision);
        document.getElementById('slug').addEventListener('input', checkSlugCollision);

        // Media upload handler
        document.getElementById('mediaFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const password = document.getElementById('password').value;
            if (!password) {
                alert('Please enter password first');
                return;
            }

            const uploadStatus = document.getElementById('uploadStatus');
            uploadStatus.textContent = 'Uploading...';

            try {
                const formData = new FormData();
                formData.append('password', password);
                formData.append('file', file);

                const response = await fetch(`${API}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Upload failed');
                }

                // Insert markdown at cursor position
                const textarea = document.getElementById('content');
                const cursorPos = textarea.selectionStart;
                const textBefore = textarea.value.substring(0, cursorPos);
                const textAfter = textarea.value.substring(cursorPos);
                textarea.value = textBefore + '\n\n' + result.markdown + '\n\n' + textAfter;

                uploadStatus.textContent = '✓ Uploaded';
                setTimeout(() => uploadStatus.textContent = '', 2000);
            } catch (error) {
                uploadStatus.textContent = '✗ ' + error.message;
            }
        });

        // Post form handler
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const slug = document.getElementById('slug').value.trim();
            const content = document.getElementById('content').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Publishing...';
            statusDiv.className = '';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch(`${API}/publish`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, title, slug, content })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Publish failed');
                }

                statusDiv.innerHTML = `✓ Published as ${result.filename}<br>Site updates in ~60 seconds.`;
                statusDiv.className = 'success show';

                // Clear form
                document.getElementById('title').value = '';
                document.getElementById('slug').value = '';
                document.getElementById('content').value = '';
            } catch (error) {
                statusDiv.innerHTML = '✗ ' + error.message;
                statusDiv.className = 'error show';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publish';
            }
        });
    </script>
</body>

</html>
