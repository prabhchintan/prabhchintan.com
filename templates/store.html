<!DOCTYPE html>
<html lang="en">
<head>
<title>Randhawa: Store</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Digital products by Prabhchintan Randhawa">
<meta property="og:title" content="Randhawa: Store">
<meta property="og:description" content="Digital products by Prabhchintan Randhawa">
<meta property="og:type" content="website">
<meta property="og:url" content="https://prabhchintan.com/store">
<meta property="og:site_name" content="Randhawa">
<meta property="og:image" content="https://prabhchintan.com/social.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="2400">
<meta property="og:image:height" content="1260">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Randhawa: Store">
<meta name="twitter:description" content="Digital products by Prabhchintan Randhawa">
<meta name="twitter:image" content="https://prabhchintan.com/social.jpg">
<meta name="twitter:image:alt" content="Randhawa: Store">
<link rel="canonical" href="https://prabhchintan.com/store">
<style>{{critical_css}}</style>
<style>
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5em;margin:2em 0}
.product-card{border:1px solid var(--border-color);border-radius:8px;overflow:hidden;transition:border-color 0.3s}
.product-card:hover{border-color:var(--text-color)}
.product-img-wrap{aspect-ratio:1;overflow:hidden;background:rgba(0,0,0,0.03)}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.product-body{padding:1.2em}
.product-title{font-size:1.1em;margin:0 0 0.3em;font-family:var(--font-body)}
.product-desc{color:var(--meta-color);font-size:0.9em;margin:0 0 0.8em;line-height:1.5}
.product-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5em}
.product-price{font-size:1.05em;font-weight:600}
.product-size{font-size:0.8em;color:var(--meta-color)}
.product-files{font-size:0.8em;color:var(--meta-color)}
.buy-btn{background:var(--text-color);color:var(--bg-color);border:1px solid var(--text-color);padding:0.5em 1.5em;border-radius:4px;cursor:pointer;font-family:var(--font-body);font-size:0.9em;transition:all 0.2s;text-decoration:none;display:inline-block}
.buy-btn:hover{background:transparent;color:var(--text-color)}
.buy-btn:disabled{opacity:0.4;cursor:not-allowed}
.store-status{margin-top:0.8em;font-size:0.85em;color:var(--meta-color);line-height:1.6}
.store-status a{color:var(--link-color)}
.store-empty{color:var(--meta-color);text-align:center;padding:3em 0}
.wallet-links{font-size:0.85em;line-height:1.8}
.wallet-links a{color:var(--link-color)}
.wallet-links span{color:var(--meta-color)}
.dl-links{margin:0.5em 0;padding:0.8em;border:1px solid var(--border-color);border-radius:6px;background:rgba(0,0,0,0.01)}
.dl-links a{display:block;padding:0.3em 0;color:var(--link-color);font-size:0.9em}
.dl-email{display:inline-block;margin-top:0.5em;font-size:0.85em;color:var(--link-color);cursor:pointer;text-decoration:underline}
.redownload-link{font-size:0.85em;color:var(--link-color);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<h1>Store</h1>

<div class="store-grid" id="storeGrid">
    <p class="store-empty">Loading...</p>
</div>

<script>
(function(){
    var RECIPIENT='0x3570958b8dcbc4f663f508efcedb454ee9af9516';
    var HAS_WALLET=!!window.ethereum;
    var PAGE_URL=encodeURIComponent(window.location.href);
    var DAPP_PATH=window.location.host+window.location.pathname;

    var CHAINS={
        '0x1':    {name:'Ethereum', usdc:'0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'},
        '0x2105': {name:'Base',     usdc:'0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'},
        '0xa4b1': {name:'Arbitrum', usdc:'0xaf88d065e77c8cC2239327C5EDb3A432268e5831'},
        '0xa':    {name:'Optimism', usdc:'0x0b2C639c533813f4Aa9D7837CAf62653d097Ff85'},
        '0x89':   {name:'Polygon',  usdc:'0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359'}
    };

    var grid=document.getElementById('storeGrid');
    var addr=null;
    var chainHex=null;
    var products=[];

    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function short(a){return a.slice(0,6)+'\u2026'+a.slice(-4);}
    function hexInt(h){return parseInt(h,16);}

    function formatSize(bytes){
        if(bytes<1024)return bytes+' B';
        if(bytes<1024*1024)return(bytes/1024).toFixed(1)+' KB';
        return(bytes/(1024*1024)).toFixed(1)+' MB';
    }

    function buildUsdcCalldata(priceAtomic){
        var recipHex=RECIPIENT.slice(2).toLowerCase().padStart(64,'0');
        var amountHex=priceAtomic.toString(16).padStart(64,'0');
        return '0xa9059cbb'+recipHex+amountHex;
    }

    function waitForReceipt(txHash){
        var attempts=0;
        return new Promise(function(resolve,reject){
            (function poll(){
                ethereum.request({method:'eth_getTransactionReceipt',params:[txHash]}).then(function(receipt){
                    if(receipt)return resolve({receipt:receipt,txHash:txHash});
                    if(++attempts>90)return reject(new Error('Transaction timeout.'));
                    setTimeout(poll,2000);
                }).catch(reject);
            })();
        });
    }

    function getStoredToken(productId){
        try{
            var data=JSON.parse(localStorage.getItem('dltoken:'+productId));
            if(data && data.expiresAt>Date.now())return data.token;
            localStorage.removeItem('dltoken:'+productId);
        }catch(e){}
        return null;
    }

    function storeToken(productId,token,expiresAt){
        try{
            localStorage.setItem('dltoken:'+productId,JSON.stringify({token:token,expiresAt:expiresAt}));
        }catch(e){}
    }

    function buildDownloadHtml(token,files,title){
        var h='<div class="dl-links">';
        for(var i=0;i<files.length;i++){
            h+='<a href="/api/download?token='+encodeURIComponent(token)+'&file='+i+'">'+esc(files[i].filename)+' ('+formatSize(files[i].fileSize)+')</a>';
        }
        h+='</div>';
        // Email-me-the-link
        var links='';
        for(var i=0;i<files.length;i++){
            links+=encodeURIComponent('https://prabhchintan.com/api/download?token='+token+'&file='+i)+encodeURIComponent('\n');
        }
        var subject=encodeURIComponent('Your download: '+title);
        var body=encodeURIComponent('Here are your download links (valid 24 hours, 3 downloads):\n\n')+links+encodeURIComponent('\nFrom prabhchintan.com');
        h+='<a class="dl-email" href="mailto:?subject='+subject+'&body='+body+'">email me the download link</a>';
        return h;
    }

    function connectWallet(callback){
        if(!HAS_WALLET)return;
        ethereum.request({method:'eth_requestAccounts'}).then(function(accounts){
            if(!accounts.length)return;
            addr=accounts[0];
            return ethereum.request({method:'eth_chainId'});
        }).then(function(c){
            if(!c)return;
            chainHex=c;
            renderProducts();
            if(typeof callback==='function')callback();
        }).catch(function(){});
    }

    if(HAS_WALLET){
        ethereum.on('chainChanged',function(c){chainHex=c;renderProducts();});
        ethereum.on('accountsChanged',function(a){
            if(a.length){addr=a[0];}else{addr=null;chainHex=null;}
            renderProducts();
        });
    }

    function renderProducts(){
        if(!products.length){
            grid.innerHTML='<p class="store-empty">No products available yet.</p>';
            return;
        }
        var h='';
        for(var i=0;i<products.length;i++){
            var p=products[i];
            var existingToken=getStoredToken(p.id);
            h+='<div class="product-card" id="card-'+p.id+'">';
            if(p.imageUrl)h+='<div class="product-img-wrap"><img src="'+esc(p.imageUrl)+'" alt="'+esc(p.title)+'" loading="lazy"></div>';
            h+='<div class="product-body">';
            h+='<h3 class="product-title">'+esc(p.title)+'</h3>';
            if(p.description)h+='<p class="product-desc">'+esc(p.description)+'</p>';
            h+='<div class="product-meta">';
            h+='<div><span class="product-price">'+esc(p.priceDisplay)+'</span> <span class="product-size">'+formatSize(p.totalFileSize)+'</span>';
            if(p.files.length>1)h+=' <span class="product-files">'+p.files.length+' files</span>';
            h+='</div>';
            h+='<div>';
            if(HAS_WALLET){
                if(addr){
                    h+='<button class="buy-btn" onclick="storeBuy(\''+p.id+'\')">Buy</button>';
                }else{
                    h+='<button class="buy-btn" onclick="storeBuy(\''+p.id+'\')">Connect Wallet</button>';
                }
            }else{
                // Mobile: show wallet deep links
                h+='<div class="wallet-links">';
                h+='<a href="https://metamask.app.link/dapp/'+DAPP_PATH+'">Open in MetaMask</a>';
                h+='<span> · </span>';
                h+='<a href="https://go.cb-w.com/dapp?cb_url='+PAGE_URL+'">Coinbase Wallet</a>';
                h+='</div>';
            }
            if(existingToken){
                h+=' <span class="redownload-link" onclick="storeRedownload(\''+p.id+'\')">re-download</span>';
            }
            h+='</div>';
            h+='</div>';
            h+='<div class="store-status" id="status-'+p.id+'"></div>';
            h+='</div>';
            h+='</div>';
        }
        grid.innerHTML=h;
    }

    function setProductStatus(productId,msg){
        var el=document.getElementById('status-'+productId);
        if(el)el.textContent=msg;
    }
    function setProductStatusHtml(productId,h){
        var el=document.getElementById('status-'+productId);
        if(el)el.innerHTML=h;
    }

    function executeBuy(productId){
        var chain=CHAINS[chainHex];
        if(!chain){setProductStatus(productId,'Please switch to a supported network.');return;}

        var product=null;
        for(var i=0;i<products.length;i++){
            if(products[i].id===productId){product=products[i];break;}
        }
        if(!product)return;

        var txPromise;
        if(product.currency==='eth'){
            var weiHex='0x'+BigInt(product.price).toString(16);
            setProductStatus(productId,'Sending '+product.priceDisplay+' on '+chain.name+'\u2026');
            txPromise=ethereum.request({
                method:'eth_sendTransaction',
                params:[{from:addr,to:RECIPIENT,value:weiHex}]
            });
        }else{
            var calldata=buildUsdcCalldata(product.price);
            setProductStatus(productId,'Sending '+product.priceDisplay+' on '+chain.name+'\u2026');
            txPromise=ethereum.request({
                method:'eth_sendTransaction',
                params:[{from:addr,to:chain.usdc,data:calldata}]
            });
        }

        txPromise.then(function(txHash){
            setProductStatus(productId,'Confirming on '+chain.name+'\u2026');
            return waitForReceipt(txHash);
        }).then(function(result){
            if(result.receipt.status!=='0x1'){
                setProductStatus(productId,'Transaction failed on chain.');
                return;
            }
            setProductStatus(productId,'Verifying payment\u2026');
            return fetch('/api/purchase',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({productId:productId,txHash:result.txHash,address:addr,chainId:hexInt(chainHex)})
            }).then(function(r){return r.json();});
        }).then(function(data){
            if(!data)return;
            if(data.success){
                storeToken(productId,data.downloadToken,Date.now()+24*60*60*1000);
                var product=null;
                for(var i=0;i<products.length;i++){
                    if(products[i].id===productId){product=products[i];break;}
                }
                if(product){
                    setProductStatusHtml(productId,buildDownloadHtml(data.downloadToken,product.files,product.title));
                    if(product.files.length===1){
                        window.location.href='/api/download?token='+encodeURIComponent(data.downloadToken)+'&file=0';
                    }
                }
            }else{
                setProductStatus(productId,data.error||'Purchase failed.');
            }
        }).catch(function(err){
            if(err.code===4001){setProductStatus(productId,'Transaction cancelled.');return;}
            setProductStatus(productId,err.message||'Something went wrong.');
        });
    }

    window.storeBuy=function(productId){
        if(!HAS_WALLET)return;
        if(!addr){
            setProductStatus(productId,'Connecting wallet\u2026');
            connectWallet(function(){
                executeBuy(productId);
            });
            return;
        }
        executeBuy(productId);
    };

    window.storeRedownload=function(productId){
        var token=getStoredToken(productId);
        if(!token){setProductStatus(productId,'Token expired. Please purchase again.');return;}
        var product=null;
        for(var i=0;i<products.length;i++){
            if(products[i].id===productId){product=products[i];break;}
        }
        if(!product)return;
        if(product.files.length>1){
            setProductStatusHtml(productId,buildDownloadHtml(token,product.files,product.title));
        }else{
            setProductStatusHtml(productId,buildDownloadHtml(token,product.files,product.title));
            window.location.href='/api/download?token='+encodeURIComponent(token)+'&file=0';
        }
    };

    fetch('/api/products')
        .then(function(r){return r.json();})
        .then(function(d){
            products=d.products||[];
            renderProducts();
        })
        .catch(function(){
            grid.innerHTML='<p class="store-empty">Failed to load products.</p>';
        });

    renderProducts();
})();
</script>
</body>
</html>
