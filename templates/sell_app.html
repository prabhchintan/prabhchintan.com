<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sell - Randhawa</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <!-- CRITICAL_CSS_PLACEHOLDER -->
    <style>
        .form-group {
            margin-bottom: 1.5em
        }

        label {
            display: block;
            margin-bottom: 0.4em;
            color: var(--meta-color);
            font-size: 0.8em;
            letter-spacing: 0.08em;
            text-transform: uppercase
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.4em 0;
            border: none;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-body);
            font-size: 1.2em;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            transition: border-color 0.3s
        }

        input:focus,
        select:focus {
            outline: none;
            border-bottom-color: var(--text-color)
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1em;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1em;
            line-height: 1.6;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            resize: vertical;
            transition: border-color 0.3s
        }

        textarea:focus {
            outline: none;
            border-color: var(--text-color)
        }

        button {
            background: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
            width: 100%;
            padding: 0.8em;
            margin-top: 0.5em
        }

        button:hover {
            background: transparent;
            color: var(--text-color)
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .media-upload {
            margin: 1em 0;
            padding: 1.5em;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.01)
        }

        .media-upload:hover {
            border-color: var(--text-color);
            background: rgba(0, 0, 0, 0.02)
        }

        .media-upload.dragover {
            border-color: var(--link-color);
            background: rgba(0, 102, 204, 0.05)
        }

        .media-upload-icon {
            font-size: 2em;
            margin-bottom: 0.3em
        }

        .media-upload-text {
            color: var(--meta-color);
            font-size: 0.9em
        }

        .attached-files {
            margin: 0.5em 0;
            padding: 0;
            list-style: none
        }

        .attached-file {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6em 0.8em;
            margin: 0.4em 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.01)
        }

        .attached-file-name {
            font-size: 0.9em;
            color: var(--text-color)
        }

        .attached-file-size {
            font-size: 0.8em;
            color: var(--meta-color)
        }

        .remove-file {
            background: transparent;
            border: none;
            color: #a33b32;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0.2em 0.5em;
            width: auto;
            margin: 0
        }

        .remove-file:hover {
            background: rgba(163, 59, 50, 0.1)
        }

        .price-row {
            display: flex;
            gap: 1em;
            align-items: flex-end
        }

        .price-row .form-group:first-child {
            flex: 1
        }

        .price-row .form-group:last-child {
            width: 120px
        }

        .image-preview {
            margin: 1em 0;
            text-align: center
        }

        .image-preview img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color)
        }

        .image-preview .remove-file {
            display: block;
            margin: 0.5em auto 0;
            font-size: 0.85em
        }

        #status {
            margin-top: 1em;
            padding: 1em;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: center;
            display: none
        }

        #status.show {
            display: block
        }

        .success {
            background: #f0f7f0;
            color: #2b703e;
            border: 1px solid #d4e8d4
        }

        .error {
            background: #fef0ef;
            color: #a33b32;
            border: 1px solid #f5d5d3
        }

        .info {
            background: #f0f7ff;
            color: #0066cc;
            border: 1px solid #d4e8f5
        }

        .product-list {
            margin-bottom: 2.5em;
            padding-bottom: 1.5em;
            border-bottom: 1px solid var(--border-color)
        }

        .product-list h2 {
            font-size: 1.1em;
            margin-bottom: 1em
        }

        .form-section-title {
            font-size: 1.1em;
            margin-bottom: 1em;
            color: var(--text-color)
        }

        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8em 0;
            border-bottom: 1px solid var(--border-color)
        }

        .product-item-info {
            font-size: 0.95em
        }

        .product-item-price {
            font-size: 0.85em;
            color: var(--meta-color)
        }

        .edit-link {
            font-size: 0.9em
        }
    </style>
</head>

<body>
    <div class="profile-pic">
        <img src="/profile.png" alt="Profile" width="80" height="80">
    </div>

    <h1 id="pageTitle">Sell</h1>

    <div class="product-list" id="productList" style="display:none">
        <h2>Your Products</h2>
        <div id="productListItems"></div>
    </div>

    <h2 class="form-section-title" id="formTitle">New Product</h2>

    <form id="sellForm">
        <input type="hidden" id="editProductId" value="">

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="Product name" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="What are they getting?"></textarea>
        </div>

        <div class="price-row">
            <div class="form-group">
                <label for="price">Price</label>
                <input type="number" id="price" required placeholder="5" min="0.0001" step="any" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="currency">Currency</label>
                <select id="currency">
                    <option value="usdc">USDC</option>
                    <option value="eth">ETH</option>
                </select>
            </div>
        </div>

        <label>Display Image (optional)</label>
        <div class="media-upload" id="imageUpload">
            <input type="file" id="imageInput" accept="image/*" style="display:none">
            <div class="media-upload-icon">🖼</div>
            <div class="media-upload-text">
                <strong>Product Image</strong><br>
                <small>Click or drag image here</small>
            </div>
        </div>
        <div id="imagePreview" class="image-preview" style="display:none"></div>

        <label>Files</label>
        <div class="media-upload" id="fileUpload">
            <input type="file" id="fileInput" multiple style="display:none">
            <div class="media-upload-icon">📦</div>
            <div class="media-upload-text">
                <strong>Upload Files</strong><br>
                <small>Click or drag files here (multiple allowed)</small>
            </div>
        </div>

        <ul id="existingFiles" class="attached-files"></ul>
        <ul id="newFiles" class="attached-files"></ul>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Admin password" autocomplete="off">
        </div>

        <button type="submit" id="submitBtn">Upload Product</button>
    </form>

    <div id="status"></div>

    <p><a href="/store">← Store</a></p>

    <script>
        let newFilesArr = [];
        let removeFilesArr = [];
        let selectedImage = null;
        let removeImage = false;
        let isEditMode = false;

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // File upload area
        const fileUploadArea = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');

        fileUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); fileUploadArea.classList.add('dragover'); });
        fileUploadArea.addEventListener('dragleave', () => { fileUploadArea.classList.remove('dragover'); });
        fileUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadArea.classList.remove('dragover');
            Array.from(e.dataTransfer.files).forEach(addNewFile);
        });
        fileUploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(addNewFile);
            e.target.value = '';
        });

        function addNewFile(file) {
            if (newFilesArr.some(f => f.name === file.name && f.size === file.size)) return;
            newFilesArr.push(file);
            renderNewFiles();
        }

        function renderNewFiles() {
            const list = document.getElementById('newFiles');
            list.innerHTML = '';
            newFilesArr.forEach((file, i) => {
                const li = document.createElement('li');
                li.className = 'attached-file';
                li.innerHTML = '<div><div class="attached-file-name">' + escHtml(file.name) + '</div><div class="attached-file-size">' + formatFileSize(file.size) + '</div></div>';
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'remove-file';
                btn.innerHTML = '×';
                btn.onclick = () => { newFilesArr.splice(i, 1); renderNewFiles(); };
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        // Image upload area
        const imageUploadArea = document.getElementById('imageUpload');
        const imageInput = document.getElementById('imageInput');

        imageUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); imageUploadArea.classList.add('dragover'); });
        imageUploadArea.addEventListener('dragleave', () => { imageUploadArea.classList.remove('dragover'); });
        imageUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) setImage(e.dataTransfer.files[0]);
        });
        imageUploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length) setImage(e.target.files[0]);
        });

        function setImage(file) {
            if (!file.type.startsWith('image/')) return;
            selectedImage = file;
            removeImage = false;
            const preview = document.getElementById('imagePreview');
            const url = URL.createObjectURL(file);
            preview.innerHTML = '<img src="' + url + '"><button type="button" class="remove-file" onclick="clearImage()">Remove image</button>';
            preview.style.display = '';
            imageUploadArea.style.display = 'none';
        }

        window.clearImage = function() {
            selectedImage = null;
            removeImage = true;
            document.getElementById('imagePreview').style.display = 'none';
            imageUploadArea.style.display = '';
        };

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Edit mode: load product data
        async function enterEditMode(productId) {
            isEditMode = true;
            document.getElementById('editProductId').value = productId;
            document.getElementById('formTitle').textContent = 'Edit Product';
            document.getElementById('submitBtn').textContent = 'Update Product';

            try {
                const resp = await fetch('/api/products?id=' + encodeURIComponent(productId));
                const data = await resp.json();
                if (!data.product) return;
                const p = data.product;

                document.getElementById('title').value = p.title || '';
                document.getElementById('description').value = p.description || '';

                // Reverse price from display
                if (p.currency === 'usdc') {
                    document.getElementById('price').value = p.price / 1e6;
                } else {
                    document.getElementById('price').value = Number(BigInt(p.price)) / 1e18;
                }
                document.getElementById('currency').value = p.currency;

                // Show existing files
                renderExistingFiles(p.files || []);

                // Show existing image
                if (p.imageUrl) {
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = '<img src="' + p.imageUrl + '"><button type="button" class="remove-file" onclick="clearImage()">Remove image</button>';
                    preview.style.display = '';
                    imageUploadArea.style.display = 'none';
                }
            } catch (e) {
                console.error('Failed to load product', e);
            }
        }

        function renderExistingFiles(files) {
            const list = document.getElementById('existingFiles');
            list.innerHTML = '';
            files.forEach(f => {
                if (removeFilesArr.includes(f.filename)) return;
                const li = document.createElement('li');
                li.className = 'attached-file';
                li.innerHTML = '<div><div class="attached-file-name">' + escHtml(f.filename) + '</div><div class="attached-file-size">' + formatFileSize(f.fileSize) + ' (existing)</div></div>';
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'remove-file';
                btn.innerHTML = '×';
                btn.onclick = () => {
                    removeFilesArr.push(f.filename);
                    li.remove();
                };
                li.appendChild(btn);
                list.appendChild(li);
            });
        }

        // Load product list
        async function loadProductList() {
            try {
                const resp = await fetch('/api/products');
                const data = await resp.json();
                const products = data.products || [];
                if (!products.length) return;

                const container = document.getElementById('productListItems');
                container.innerHTML = '';
                products.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product-item';
                    div.innerHTML = '<div><div class="product-item-info">' + escHtml(p.title) + '</div><div class="product-item-price">' + escHtml(p.priceDisplay) + ' · ' + p.files.length + ' file(s)</div></div><a class="edit-link" href="/sell?edit=' + p.id + '">Edit</a>';
                    container.appendChild(div);
                });
                document.getElementById('productList').style.display = '';
            } catch (e) {}
        }

        // Submit handler
        document.getElementById('sellForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const price = document.getElementById('price').value;
            const currency = document.getElementById('currency').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            if (!isEditMode && !newFilesArr.length) {
                statusDiv.innerHTML = 'Please select at least one file.';
                statusDiv.className = 'error show';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = isEditMode ? 'Updating...' : 'Uploading...';
            statusDiv.className = 'info show';
            statusDiv.innerHTML = isEditMode ? 'Updating product...' : 'Uploading files...';

            try {
                const formData = new FormData();
                formData.append('password', password);
                formData.append('title', title);
                formData.append('description', description);
                formData.append('price', price);
                formData.append('currency', currency);

                if (isEditMode) {
                    formData.append('productId', document.getElementById('editProductId').value);
                    removeFilesArr.forEach(fn => formData.append('removeFile', fn));
                    if (removeImage && !selectedImage) formData.append('removeImage', '1');
                }

                newFilesArr.forEach(f => formData.append('file', f));
                if (selectedImage) formData.append('image', selectedImage);

                const endpoint = isEditMode ? '/api/edit-product' : '/api/sell-upload';
                const response = await fetch(endpoint, { method: 'POST', body: formData });
                const result = await response.json();

                if (!response.ok) throw new Error(result.error || 'Failed');

                if (isEditMode) {
                    statusDiv.innerHTML = '✓ Product updated.';
                } else {
                    statusDiv.innerHTML = '✓ Product created: ' + result.productId + '<br>Price: ' + result.priceDisplay + '<br><br>Embed code:<br><code>&lt;div class="store-embed" data-product="' + result.productId + '"&gt;&lt;/div&gt;</code>';
                }
                statusDiv.className = 'success show';

                if (!isEditMode) {
                    document.getElementById('title').value = '';
                    document.getElementById('description').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('password').value = '';
                    newFilesArr = [];
                    renderNewFiles();
                    selectedImage = null;
                    document.getElementById('imagePreview').style.display = 'none';
                    imageUploadArea.style.display = '';
                    loadProductList();
                }

            } catch (error) {
                statusDiv.innerHTML = '✗ ' + error.message;
                statusDiv.className = 'error show';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isEditMode ? 'Update Product' : 'Upload Product';
            }
        });

        // Init
        const params = new URLSearchParams(window.location.search);
        if (params.get('edit')) {
            enterEditMode(params.get('edit'));
        }
        loadProductList();
    </script>
</body>

</html>
