<!DOCTYPE html>
<html lang="en">

<head>
    <title>Randhawa: {{title}}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="description" content="{{description}}">

    <!-- Open Graph -->
    <meta property="og:title" content="Randhawa: {{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://prabhchintan.com/{{slug}}">
    <meta property="og:site_name" content="Randhawa">
    <meta property="og:image" content="https://prabhchintan.com/social.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="2400">
    <meta property="og:image:height" content="1260">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Randhawa: {{title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://prabhchintan.com/social.jpg">
    <meta name="twitter:image:alt" content="Randhawa: {{title}}">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://prabhchintan.com/{{slug}}">

    <style>{{critical_css}}</style>
</head>

<body>
    {{content}}
    {{post_nav}}
    {{comments_section}}
    {{drop_cap_js}}
    <script src="/store-widget.js"></script>
</body>

</html>
