<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{title}}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <meta name="description" content="{{description}}">

    <!-- Social Media Meta Tags -->
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://prabhchintan.com/{{slug}}">
    <meta property="og:site_name" content="prabhchintan.com">
    <meta property="og:image" content="https://prabhchintan.com/profile.png">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:url" content="https://prabhchintan.com/{{slug}}">
    <meta name="twitter:image" content="https://prabhchintan.com/profile.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://prabhchintan.com/{{slug}}">

    <style>{{critical_css}}</style>
</head>

<body>
    {{content}}
    <script>
    (function(){
        var d=document.querySelector('.drop-cap');
        if(!d)return;
        var c=[
            'rgba(0,102,204,0.35)',
            'rgba(153,50,50,0.4)',
            'rgba(60,120,80,0.35)',
            'rgba(140,90,40,0.38)',
            'rgba(100,60,140,0.35)',
            'rgba(50,120,130,0.35)'
        ];
        d.style.setProperty('--drop-cap-color',c[Math.floor(Math.random()*c.length)]);
    })();
    </script>
</body>

</html>
