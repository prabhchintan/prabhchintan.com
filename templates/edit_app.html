<!DOCTYPE html>
<html lang="en">

<head>
    <title>Edit Post - Randhawa Inc.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <!-- CRITICAL_CSS_PLACEHOLDER -->
    <style>
        .form-group {
            margin-bottom: 1.5em
        }

        label {
            display: block;
            margin-bottom: 0.4em;
            color: var(--meta-color);
            font-size: 0.8em;
            letter-spacing: 0.08em;
            text-transform: uppercase
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.4em 0;
            border: none;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-body);
            font-size: 1.2em;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            transition: border-color 0.3s
        }

        input:focus {
            outline: none;
            border-bottom-color: var(--text-color)
        }

        textarea {
            width: 100%;
            min-height: 350px;
            padding: 1em;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1em;
            line-height: 1.6;
            box-sizing: border-box;
            background: transparent;
            color: var(--text-color);
            resize: vertical
        }

        textarea:disabled {
            opacity: 0.5
        }

        button {
            background: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s;
            width: 100%;
            padding: 0.8em;
            margin-top: 0.5em
        }

        button:hover {
            background: transparent;
            color: var(--text-color)
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        #matches {
            margin: 1em 0
        }

        .match-item {
            padding: 0.8em;
            margin: 0.5em 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s
        }

        .match-item:hover {
            border-color: var(--text-color);
            background: rgba(0, 0, 0, 0.02)
        }

        .match-item.selected {
            border-color: var(--text-color);
            background: rgba(0, 0, 0, 0.05)
        }

        .match-title {
            font-weight: bold;
            margin-bottom: 0.3em
        }

        .match-meta {
            font-size: 0.85em;
            color: var(--meta-color)
        }

        #status {
            margin-top: 1em;
            padding: 1em;
            border-radius: 4px;
            font-size: 0.9em;
            text-align: center;
            display: none
        }

        #status.show {
            display: block
        }

        .success {
            background: #f0f7f0;
            color: #2b703e;
            border: 1px solid #d4e8d4
        }

        .error {
            background: #fef0ef;
            color: #a33b32;
            border: 1px solid #f5d5d3
        }
    </style>
</head>

<body>
    <div class="profile-pic">
        <img src="/profile.png" alt="Profile" width="80" height="80">
    </div>

    <h1>Edit Post</h1>

    <div class="form-group">
        <label for="search">Search</label>
        <input type="text" id="search" placeholder="Type to search posts..." autocomplete="off">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Admin password" autocomplete="off">
    </div>

    <button id="searchBtn">Search Posts</button>

    <div id="matches"></div>

    <div class="form-group" style="display:none" id="editorSection">
        <label for="content">Body</label>
        <textarea id="content" disabled></textarea>
    </div>

    <button id="saveBtn" style="display:none" disabled>Save Changes</button>

    <div id="status"></div>

    <script>
        const API = '/api';
        let allPosts = [];
        let selectedPost = null;

        // Fuzzy search function
        function fuzzyMatch(query, text) {
            query = query.toLowerCase();
            text = text.toLowerCase();
            let queryIndex = 0;
            for (let i = 0; i < text.length && queryIndex < query.length; i++) {
                if (text[i] === query[queryIndex]) queryIndex++;
            }
            return queryIndex === query.length;
        }

        // Search handler
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const password = document.getElementById('password').value;
            const searchQuery = document.getElementById('search').value.trim();
            const matchesDiv = document.getElementById('matches');
            const statusDiv = document.getElementById('status');

            if (!password) {
                statusDiv.innerHTML = '✗ Please enter password';
                statusDiv.className = 'error show';
                return;
            }

            statusDiv.style.display = 'none';
            matchesDiv.innerHTML = '<p>Loading posts...</p>';

            try {
                const response = await fetch(`${API}/posts`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Failed to load posts');
                }

                allPosts = result.posts;

                // Filter posts if search query provided
                let filtered = allPosts;
                if (searchQuery) {
                    filtered = allPosts.filter(post =>
                        fuzzyMatch(searchQuery, post.slug) ||
                        fuzzyMatch(searchQuery, post.filename) ||
                        post.date.includes(searchQuery)
                    );
                }

                if (filtered.length === 0) {
                    matchesDiv.innerHTML = '<p>No posts found.</p>';
                    return;
                }

                // Display matches
                matchesDiv.innerHTML = filtered.map((post, idx) => `
                    <div class="match-item" data-idx="${idx}" data-filename="${post.filename}">
                        <div class="match-title">${post.slug}</div>
                        <div class="match-meta">${post.date} • ${post.filename}</div>
                    </div>
                `).join('');

                // Add click handlers
                document.querySelectorAll('.match-item').forEach(item => {
                    item.addEventListener('click', () => selectPost(item.dataset.filename));
                });

            } catch (error) {
                matchesDiv.innerHTML = '';
                statusDiv.innerHTML = '✗ ' + error.message;
                statusDiv.className = 'error show';
            }
        });

        // Select and load post
        async function selectPost(filename) {
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            const content = document.getElementById('content');
            const editorSection = document.getElementById('editorSection');
            const saveBtn = document.getElementById('saveBtn');

            // Update UI
            document.querySelectorAll('.match-item').forEach(item => {
                item.classList.toggle('selected', item.dataset.filename === filename);
            });

            statusDiv.innerHTML = 'Loading...';
            statusDiv.className = 'show';

            try {
                // Fetch file content via GitHub API directly (Functions don't support GET with body)
                const getUrl = `https://api.github.com/repos/prabhchintan/prabhchintan.com/contents/posts/${filename}`;
                const response = await fetch(getUrl);
                const fileData = await response.json();

                if (!response.ok) {
                    throw new Error('Failed to load post content');
                }

                // Decode content
                const decoded = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));

                selectedPost = { filename, sha: fileData.sha };
                content.value = decoded;
                content.disabled = false;
                editorSection.style.display = 'block';
                saveBtn.style.display = 'block';
                saveBtn.disabled = false;

                statusDiv.innerHTML = `✓ Loaded ${filename}`;
                statusDiv.className = 'success show';
                setTimeout(() => statusDiv.style.display = 'none', 2000);
            } catch (error) {
                statusDiv.innerHTML = '✗ ' + error.message;
                statusDiv.className = 'error show';
            }
        }

        // Save handler
        document.getElementById('saveBtn').addEventListener('click', async () => {
            if (!selectedPost) return;

            const password = document.getElementById('password').value;
            const content = document.getElementById('content').value;
            const saveBtn = document.getElementById('saveBtn');
            const statusDiv = document.getElementById('status');

            if (!confirm(`Save changes to ${selectedPost.filename}?`)) return;

            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch(`${API}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password,
                        filename: selectedPost.filename,
                        content
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Save failed');
                }

                statusDiv.innerHTML = `✓ Saved ${selectedPost.filename}<br>Site updates in ~60 seconds.`;
                statusDiv.className = 'success show';

                // Clear form on success
                document.getElementById('content').value = '';
                document.getElementById('content').disabled = true;
                document.getElementById('search').value = '';
                editorSection.style.display = 'none';
                saveBtn.style.display = 'none';
                selectedPost = null;

                // Clear matches and show fresh state
                document.getElementById('matchesDiv').innerHTML = '';
                document.querySelectorAll('.match-item').forEach(item => {
                    item.classList.remove('selected');
                });
            } catch (error) {
                // On error, keep form intact so user can fix and retry
                statusDiv.innerHTML = '✗ ' + error.message;
                statusDiv.className = 'error show';
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Changes';
            }
        });

        // Real-time fuzzy search
        document.getElementById('search').addEventListener('input', () => {
            if (allPosts.length > 0) {
                document.getElementById('searchBtn').click();
            }
        });
    </script>
</body>

</html>
