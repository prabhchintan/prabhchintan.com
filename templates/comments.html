<section class="comments-section" id="comments">
<h2>Comments</h2>
<div id="comments-list"></div>
<div class="comment-form">
<input type="text" id="comment-name" placeholder="Your name" maxlength="50" autocomplete="off" spellcheck="false">
<textarea id="comment-text" placeholder="Your thoughts..." maxlength="2000"></textarea>
<div class="comment-form-actions" id="comment-actions">
<a id="comment-btn" href="javascript:void(0)">connect wallet</a><span class="comment-sep"> &middot; </span><span class="comment-cost">1 USDC via Base</span>
</div>
<p class="comment-status" id="comment-status"></p>
</div>
</section>
<script>
(function(){
    var SLUG='{{slug}}';
    var RECIPIENT='0xbc82B52FD791757De5002bcfAa5738776F63C440';
    var USDC='0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
    var CHAIN_ID='0x2105';
    var TX_DATA='0xa9059cbb'
        +'000000000000000000000000bc82b52fd791757de5002bcfaa5738776f63c440'
        +'00000000000000000000000000000000000000000000000000000000000f4240';

    var list=document.getElementById('comments-list');
    var statusEl=document.getElementById('comment-status');
    var actionsEl=document.getElementById('comment-actions');
    var nameInput=document.getElementById('comment-name');
    var textInput=document.getElementById('comment-text');
    var addr=null;

    function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function short(a){return a.slice(0,6)+'\u2026'+a.slice(-4);}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
    function setStatus(s){statusEl.textContent=s;}

    function renderComments(comments){
        if(!comments||!comments.length){
            list.innerHTML='<p class="comment-empty">No comments yet.</p>';
            return;
        }
        var h='';
        for(var i=0;i<comments.length;i++){
            var c=comments[i];
            var meta='';
            if(c.name)meta+=esc(c.name)+' \u00b7 ';
            meta+='<a href="https://basescan.org/tx/'+c.txHash+'" target="_blank" rel="noopener">'+short(c.address)+'</a>';
            meta+=' \u00b7 '+fmtDate(c.timestamp);
            h+='<div class="comment"><p class="comment-text">\u201c'+esc(c.text)+'\u201d</p><p class="comment-meta">\u2014 '+meta+'</p></div>';
        }
        list.innerHTML=h;
    }

    fetch('/api/comments?slug='+SLUG)
        .then(function(r){return r.json();})
        .then(function(d){renderComments(d.comments);})
        .catch(function(){list.innerHTML='<p class="comment-empty">No comments yet.</p>';});

    function updateActions(){
        if(addr){
            actionsEl.innerHTML='<span class="comment-addr">'+short(addr)+'</span>'
                +'<span class="comment-sep"> \u00b7 </span>'
                +'<a id="comment-btn" href="javascript:void(0)">post comment</a>'
                +'<span class="comment-sep"> \u00b7 </span>'
                +'<span class="comment-cost">1 USDC via Base</span>';
            document.getElementById('comment-btn').onclick=function(e){e.preventDefault();submitComment();};
        }
    }

    document.getElementById('comment-btn').onclick=function(e){
        e.preventDefault();
        if(addr)submitComment();
        else connectWallet();
    };

    function connectWallet(){
        if(!window.ethereum){
            setStatus('Requires a crypto wallet like MetaMask.');
            return;
        }
        ethereum.request({method:'eth_requestAccounts'}).then(function(accounts){
            if(!accounts.length)return;
            addr=accounts[0];
            return ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:CHAIN_ID}]}).catch(function(err){
                if(err.code===4902){
                    return ethereum.request({method:'wallet_addEthereumChain',params:[{
                        chainId:CHAIN_ID,
                        chainName:'Base',
                        nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18},
                        rpcUrls:['https://mainnet.base.org'],
                        blockExplorerUrls:['https://basescan.org']
                    }]});
                }
                throw err;
            });
        }).then(function(){
            updateActions();
            setStatus('');
        }).catch(function(err){
            setStatus(err.message||'Connection failed.');
        });
    }

    function submitComment(){
        var name=nameInput.value.trim();
        var text=textInput.value.trim();
        if(!text){setStatus('Please write a comment.');return;}
        if(!addr){connectWallet();return;}

        setStatus('Sending 1 USDC\u2026');
        ethereum.request({
            method:'eth_sendTransaction',
            params:[{from:addr,to:USDC,data:TX_DATA}]
        }).then(function(txHash){
            setStatus('Confirming\u2026');
            return waitForReceipt(txHash);
        }).then(function(result){
            if(result.receipt.status!=='0x1'){
                setStatus('Transaction failed on chain.');
                return;
            }
            setStatus('Posting\u2026');
            return fetch('/api/comments',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({slug:SLUG,name:name,text:text,txHash:result.txHash,address:addr})
            }).then(function(r){return r.json();});
        }).then(function(data){
            if(!data)return;
            if(data.success){
                setStatus('');
                nameInput.value='';
                textInput.value='';
                fetch('/api/comments?slug='+SLUG)
                    .then(function(r){return r.json();})
                    .then(function(d){renderComments(d.comments);});
            }else{
                setStatus(data.error||'Failed to post.');
            }
        }).catch(function(err){
            if(err.code===4001){setStatus('Transaction cancelled.');return;}
            setStatus(err.message||'Something went wrong.');
        });
    }

    function waitForReceipt(txHash){
        var attempts=0;
        return new Promise(function(resolve,reject){
            (function poll(){
                ethereum.request({method:'eth_getTransactionReceipt',params:[txHash]}).then(function(receipt){
                    if(receipt)return resolve({receipt:receipt,txHash:txHash});
                    if(++attempts>90){return reject(new Error('Transaction timeout.'));}
                    setTimeout(poll,2000);
                }).catch(reject);
            })();
        });
    }
})();
</script>
