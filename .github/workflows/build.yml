name: Build Blog (Manual Only)

on:
  # Only allow manual runs; Cloudflare Pages handles automatic builds/deploys
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Needed for proper git history if required by build

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Build Script (local utility)
      env:
        CI_COMMIT_MESSAGE: "Site update via GitHub Actions (manual)"
        SKIP_GIT_PUSH: "1"
      run: |
        python3 build.py
