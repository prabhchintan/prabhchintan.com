name: Build and Deploy Blog

on:
  push:
    paths:
      - 'posts/**'
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Needed for proper git history if required by build

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Build Script
      env:
        CI_COMMIT_MESSAGE: "Site update via GitHub Actions"
        SKIP_GIT_PUSH: "1" # We'll handle the push step manually below for better control
      run: |
        python3 build.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        
        # Check if there are changes to commit
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit."
        else
          git commit -m "Auto-build generated site files [skip ci]"
          git push
        fi
